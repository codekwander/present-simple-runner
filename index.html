<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Present Simple Runner - AR English Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js & Pose Detections -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Nunito', sans-serif; background-color: #1a202c; color: white; user-select: none; -webkit-user-select: none; }
        h1, h2, h3, .brand-font { font-family: 'Fredoka One', cursive; }
        
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; background: radial-gradient(circle, #2d3748 0%, #1a202c 100%); }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); z-index: 1; opacity: 0.6; }
        #game-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; transform: scaleX(-1); }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; }
        
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
        .hidden { display: none !important; }
        .btn { background: linear-gradient(to bottom, #f6d365 0%, #fda085 100%); border: 4px solid #fff; border-radius: 50px; padding: 15px 40px; font-size: 1.5rem; font-family: 'Fredoka One', cursive; color: #d32f2f; box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; transition: all 0.2s; pointer-events: auto; }
        .btn:hover { transform: translateY(-5px) scale(1.05); }
        .btn-blue { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); color: #0d47a1; }
        .glass-panel { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border-radius: 20px; border: 2px solid rgba(255,255,255,0.4); padding: 20px; }
        
        #feedback-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 4rem; font-weight: bold; text-shadow: 3px 3px 0 #000; z-index: 20; opacity: 0; pointer-events: none; text-align: center; }
        .feedback-anim { animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes popIn { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); } }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- MAIN MENU -->
    <div id="screen-menu" class="screen">
        <h1 class="text-6xl md:text-8xl text-yellow-300 text-center mb-4 drop-shadow-lg floating">Present Simple<br><span class="text-white">RUNNER</span></h1>
        <p class="text-2xl mb-12 font-bold text-blue-200 text-center px-4">AR English Grammar Game<br><span class="text-sm font-normal">Use your body to play!</span></p>
        
        <div class="flex flex-col gap-6">
            <!-- เพิ่ม initAudio() เข้าไปใน onclick เพื่อปลดล็อคเสียงบนมือถือ -->
            <button class="btn" onclick="initAudioAndStart('standard')">▶ START GAME</button>
            <button class="btn btn-blue" onclick="showScreen('screen-teacher')">⚙️ TEACHER MODE</button>
            <button class="btn" style="background: linear-gradient(to bottom, #43e97b 0%, #38f9d7 100%); color: #1b5e20;" onclick="showScreen('screen-leaderboard')">🏆 LEADERBOARD</button>
        </div>
    </div>

    <!-- TEACHER SETTINGS -->
    <div id="screen-teacher" class="screen hidden">
        <div class="glass-panel max-w-2xl w-11/12 p-8 flex flex-col items-center">
            <h2 class="text-4xl text-yellow-300 mb-6 brand-font text-center">Teacher Settings</h2>
            
            <div class="w-full space-y-6 text-xl">
                <div class="flex justify-between items-center border-b border-white/20 pb-4">
                    <label>Game Time (Seconds):</label>
                    <input type="number" id="setting-time" value="60" class="w-24 bg-white/30 text-white border-2 border-white rounded px-2 py-1 text-center font-bold">
                </div>
                
                <div class="flex justify-between items-center border-b border-white/20 pb-4">
                    <label>Game Mode:</label>
                    <select id="setting-mode" class="bg-white/30 text-white border-2 border-white rounded px-2 py-1 font-bold outline-none [&>option]:text-black">
                        <option value="standard">Standard (Read & Match)</option>
                        <option value="listening">Listening Challenge (Listen & Match)</option>
                        <option value="speed">Speed Challenge (5s per question)</option>
                    </select>
                </div>

                <div class="flex justify-between items-center border-b border-white/20 pb-4">
                    <label>Difficulty:</label>
                    <select id="setting-difficulty" class="bg-white/30 text-white border-2 border-white rounded px-2 py-1 font-bold outline-none [&>option]:text-black">
                        <option value="all">All Levels</option>
                        <option value="easy">Easy</option>
                        <option value="medium">Medium</option>
                        <option value="hard">Hard</option>
                        <option value="expert">Expert</option>
                    </select>
                </div>

                <div class="flex justify-between items-center border-b border-white/20 pb-4">
                    <label>Auto-Read Question:</label>
                    <input type="checkbox" id="setting-autoread" checked class="w-6 h-6 rounded cursor-pointer accent-green-400">
                </div>

                <div class="flex justify-between items-center pb-4">
                    <label>Target Colors:</label>
                    <input type="color" id="setting-color" value="#ffeb3b" class="w-12 h-12 rounded cursor-pointer border-none bg-transparent">
                </div>
            </div>

            <div class="mt-8 flex gap-4 w-full">
                <button class="btn btn-blue flex-1" onclick="showScreen('screen-menu')">BACK</button>
                <!-- เพิ่ม initAudio() เพื่อปลดล็อคเสียงก่อนเริ่มจากหน้านี้ -->
                <button class="btn flex-1" onclick="initAudioAndApplySettings()">PLAY NOW</button>
            </div>
        </div>
    </div>

    <!-- LEADERBOARD -->
    <div id="screen-leaderboard" class="screen hidden">
        <div class="glass-panel max-w-md w-11/12 flex flex-col items-center">
            <h2 class="text-4xl text-yellow-300 mb-6 brand-font text-center">🏆 TOP SCORES 🏆</h2>
            <div id="leaderboard-list" class="w-full space-y-2 mb-8 max-h-64 overflow-y-auto pr-2">
                <!-- Injected via JS -->
            </div>
            <button class="btn btn-blue w-full" onclick="showScreen('screen-menu')">BACK TO MENU</button>
        </div>
    </div>

    <!-- LOADING SCREEN -->
    <div id="screen-loading" class="screen hidden flex-col">
        <div class="loader mb-6"></div>
        <h2 class="text-3xl text-white brand-font tracking-wider" id="loading-text">Loading AI Models...</h2>
        <p class="mt-4 text-blue-200">Please allow camera access.</p>
    </div>

    <!-- GAME UI -->
    <div id="game-container" class="hidden">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="game-canvas"></canvas>
        
        <div id="ui-layer">
            <!-- Top Bar -->
            <div class="flex justify-between items-start p-4 md:p-6 w-full">
                <div class="glass-panel py-2 px-6 flex items-center gap-3">
                    <span class="text-3xl md:text-4xl brand-font text-yellow-300">SCORE</span>
                    <span id="score-display" class="text-4xl md:text-5xl font-black text-white">0</span>
                </div>
                
                <div class="glass-panel py-2 px-6 flex flex-col items-center">
                    <span class="text-xl font-bold text-gray-200 uppercase tracking-widest">TIME</span>
                    <span id="timer-display" class="text-5xl font-black text-red-400 brand-font">60</span>
                </div>
            </div>

            <!-- Question Bar (Middle-top) -->
            <div id="question-container" class="absolute top-32 left-1/2 transform -translate-x-1/2 w-11/12 max-w-4xl text-center">
                <div class="glass-panel inline-block px-8 py-6 rounded-3xl shadow-2xl bg-opacity-80 bg-blue-900 border-4 border-blue-400">
                    <!-- ปรับการใช้ class ของข้อความคำถามเพื่อรองรับความยาวที่หลากหลาย -->
                    <h2 id="question-text" class="font-black text-white drop-shadow-md leading-tight break-words">We _____ to school.</h2>
                </div>
            </div>

            <div id="feedback-text" class="brand-font text-green-400">CORRECT! +10</div>
        </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div id="screen-gameover" class="screen hidden">
        <div class="glass-panel max-w-xl w-11/12 flex flex-col items-center p-10 text-center">
            <h2 class="text-6xl text-yellow-300 mb-2 brand-font">TIME'S UP!</h2>
            <div class="text-2xl text-blue-200 mb-8 font-bold">Great job runner!</div>
            
            <div class="w-full bg-black/30 rounded-2xl p-6 mb-8">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-2xl text-gray-300">Total Score:</span>
                    <span id="final-score" class="text-5xl brand-font text-white">0</span>
                </div>
                <div class="flex justify-between items-center text-lg text-gray-400">
                    <span>Accuracy:</span>
                    <span id="final-accuracy">0%</span>
                </div>
            </div>

            <input type="text" id="player-name" placeholder="Enter your name" class="w-full p-4 rounded-xl text-black text-xl font-bold text-center mb-6 outline-none border-4 border-yellow-300 focus:border-green-400">

            <div class="flex gap-4 w-full">
                <button class="btn btn-blue flex-1 text-xl" onclick="showScreen('screen-menu')">HOME</button>
                <button class="btn flex-1 text-xl" onclick="saveScoreAndRestart()">SAVE & REPLAY</button>
            </div>
        </div>
    </div>

    <script>
        // Questions Data
        const allQuestions = [
            /* EASY */
            { q: "He _____ soccer every weekend.", choices: ["play", "plays", "playing"], a: 1, diff: "easy" },
            { q: "I _____ apple juice.", choices: ["likes", "like", "liking"], a: 1, diff: "easy" },
            { q: "They _____ in London.", choices: ["lives", "living", "live"], a: 2, diff: "easy" },
            { q: "She _____ a book before bed.", choices: ["read", "reads", "reading"], a: 1, diff: "easy" },
            { q: "We _____ to school by bus.", choices: ["go", "goes", "going"], a: 0, diff: "easy" },
            { q: "It _____ a lot in winter.", choices: ["rain", "raining", "rains"], a: 2, diff: "easy" },
            { q: "You _____ very fast.", choices: ["runs", "run", "ran"], a: 1, diff: "easy" },
            { q: "My cat _____ all day.", choices: ["sleeps", "sleep", "sleeping"], a: 0, diff: "easy" },
            { q: "The birds _____ in the tree.", choices: ["sings", "sing", "singing"], a: 1, diff: "easy" },
            { q: "John _____ breakfast at 7 AM.", choices: ["eat", "eating", "eats"], a: 2, diff: "easy" },
            /* MEDIUM */
            { q: "She _____ to school on Sunday.", choices: ["don't go", "doesn't goes", "doesn't go"], a: 2, diff: "medium" },
            { q: "He _____ hard for exams.", choices: ["study", "studies", "studys"], a: 1, diff: "medium" },
            { q: "My mother _____ TV in the evening.", choices: ["watch", "watches", "watchs"], a: 1, diff: "medium" },
            { q: "They _____ like spicy food.", choices: ["don't", "doesn't", "aren't"], a: 0, diff: "medium" },
            { q: "The baby _____ when he is hungry.", choices: ["cry", "crys", "cries"], a: 2, diff: "medium" },
            { q: "Sarah _____ her hair every morning.", choices: ["brushes", "brush", "brushs"], a: 0, diff: "medium" },
            { q: "We _____ work on weekends.", choices: ["doesn't", "don't", "isn't"], a: 1, diff: "medium" },
            { q: "The mechanic _____ cars.", choices: ["fix", "fixs", "fixes"], a: 2, diff: "medium" },
            { q: "He _____ his hands before eating.", choices: ["washs", "washes", "wash"], a: 1, diff: "medium" },
            { q: "I _____ play tennis well.", choices: ["doesn't", "not", "don't"], a: 2, diff: "medium" },
            /* HARD */
            { q: "_____ she like pop music?", choices: ["Do", "Does", "Is"], a: 1, diff: "hard" },
            { q: "_____ you know the answer?", choices: ["Are", "Does", "Do"], a: 2, diff: "hard" },
            { q: "Where _____ he live?", choices: ["do", "does", "is"], a: 1, diff: "hard" },
            { q: "He _____ late for work.", choices: ["never is", "is never", "does never"], a: 1, diff: "hard" },
            { q: "I _____ go to the cinema.", choices: ["always", "always go", "go always"], a: 0, diff: "hard" },
            { q: "_____ they speak Spanish?", choices: ["Do", "Are", "Does"], a: 0, diff: "hard" },
            { q: "What time _____ the train leave?", choices: ["do", "is", "does"], a: 2, diff: "hard" },
            { q: "She _____ her homework after dinner.", choices: ["usually does", "does usually", "usually do"], a: 0, diff: "hard" },
            { q: "Why _____ you want to learn English?", choices: ["are", "do", "does"], a: 1, diff: "hard" },
            { q: "_____ your brother play guitar?", choices: ["Do", "Does", "Is"], a: 1, diff: "hard" },
            /* EXPERT */
            { q: "The dog and the cat _____ in the garden.", choices: ["plays", "play", "playing"], a: 1, diff: "expert" },
            { q: "Neither he nor she _____ the truth.", choices: ["knows", "know", "knowing"], a: 0, diff: "expert" },
            { q: "Everyone _____ to be happy.", choices: ["want", "wants", "wanting"], a: 1, diff: "expert" },
            { q: "My boss, together with his wife, _____ coming.", choices: ["are", "is", "do"], a: 1, diff: "expert" },
            { q: "He _____ any brothers or sisters.", choices: ["hasn't", "doesn't have", "don't have"], a: 1, diff: "expert" },
            { q: "The scissors _____ on the table.", choices: ["is", "are", "does"], a: 1, diff: "expert" },
            { q: "Physics _____ a difficult subject.", choices: ["are", "is", "do"], a: 1, diff: "expert" },
            { q: "How often _____ she go to the gym?", choices: ["does", "do", "is"], a: 0, diff: "expert" },
            { q: "A lot of people _____ English.", choices: ["speaks", "speak", "speaking"], a: 1, diff: "expert" },
            { q: "The news _____ good today.", choices: ["are", "is", "does"], a: 1, diff: "expert" }
        ];

        // Game State Variables
        let detector;
        let video;
        let canvas;
        let ctx;
        let gameLoopId;
        
        let state = 'MENU'; // MENU, PLAYING, GAMEOVER
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let currentQuestion = null;
        let activeChoices = []; // Array of {text, x, y, radius, isCorrect, hoverProgress}
        let particles = [];
        let isTransitioning = false;
        
        let correctTouches = 0;
        let totalAttempts = 0;

        let config = {
            totalTime: 60,
            mode: 'standard', 
            targetColor: '#ffeb3b',
            questionTimeLimit: 20,
            difficulty: 'all',
            autoRead: true
        };

        let lastBonusTime = 0;
        let isBonusRound = false;

        // เปลี่ยนวิธีการประกาศ AudioContext เป็นแบบ Lazy Initialization
        let audioCtx;
        let audioInitialized = false;
        
        // ฟังก์ชันสำคัญ! ปลดล็อคระบบเสียงบนมือถือ ต้องเรียกใช้ตอนกดปุ่มทันที
        function initAudio() {
            if (audioInitialized) return Promise.resolve();

            return new Promise((resolve) => {
                // สร้าง AudioContext เมื่อมีการกดปุ่ม
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!audioCtx) {
                    audioCtx = new AudioContext();
                }

                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // สร้างเสียงเงียบสั้นๆ เพื่อปลดล็อค iOS Audio
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                gain.gain.value = 0; // ปิดเสียง
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(0);
                osc.stop(audioCtx.currentTime + 0.1);

                // ปลดล็อค SpeechSynthesis
                if ('speechSynthesis' in window) {
                    const silentUtterance = new SpeechSynthesisUtterance(' ');
                    silentUtterance.volume = 0; // เสียงเบาสุด
                    silentUtterance.rate = 10; // พูดเร็วสุดจะได้จบไวๆ
                    
                    silentUtterance.onend = () => {
                        audioInitialized = true;
                        resolve();
                    };
                    
                    silentUtterance.onerror = () => {
                        // แม้จะ error ก็ถือว่าพยายามแล้ว ให้ไปต่อ
                        audioInitialized = true;
                        resolve();
                    };

                    window.speechSynthesis.cancel(); // ยกเลิกคิวเก่าๆ ก่อน
                    window.speechSynthesis.speak(silentUtterance);
                    
                    // สำรองเผื่อ onend ไม่ทำงาน
                    setTimeout(() => {
                        if (!audioInitialized) {
                            audioInitialized = true;
                            resolve();
                        }
                    }, 500);
                } else {
                    audioInitialized = true;
                    resolve();
                }
            });
        }

        // ฟังก์ชันช่วยเหลือสำหรับตอนกดปุ่ม Start
        async function initAudioAndStart(mode) {
            // แสดงสถานะโหลดนิดนึงระหว่างรอเสียงปลดล็อค (ถ้ามันช้า)
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = "LOADING...";
            
            await initAudio();
            
            btn.innerHTML = originalText;
            startGame(mode);
        }

        // ฟังก์ชันช่วยเหลือสำหรับตอนกดปุ่ม Play Now ในหน้า Teacher
        async function initAudioAndApplySettings() {
            await initAudio();
            applySettingsAndStart();
        }

        function playSound(type) {
            if (!audioCtx) return; // ถ้าไม่มี audioCtx (ยังไม่ได้กดปุ่ม) ไม่ต้องทำอะไร
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.exponentialRampToValueAtTime(1046.50, audioCtx.currentTime + 0.1); // C6
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } else if (type === 'bonus') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(440, audioCtx.currentTime);
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1);
                osc.frequency.setValueAtTime(1320, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // stop current speaking
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US';
                msg.rate = 0.9;
                window.speechSynthesis.speak(msg);
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen, #game-container').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'screen-leaderboard') loadLeaderboard();
        }

        async function initCamera() {
            video = document.getElementById('webcam');
            if(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, 
                    audio: false 
                });
                video.srcObject = stream;
                return new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        resolve();
                    };
                });
            }
            throw new Error("No webcam found");
        }

        async function initModel() {
            const detectorConfig = { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING };
            detector = await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet, detectorConfig);
        }

        async function setupGameEnviroment() {
            showScreen('screen-loading');
            try {
                await initCamera();
                document.getElementById('loading-text').innerText = "Starting Engine...";
                await initModel();
                
                canvas = document.getElementById('game-canvas');
                ctx = canvas.getContext('2d');
                
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                
                startActualGame();
            } catch (err) {
                alert("Error starting camera/AI: " + err.message);
                showScreen('screen-menu');
            }
        }

        function resizeCanvas() {
            if(canvas && video) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        }

        function applySettingsAndStart() {
            config.totalTime = parseInt(document.getElementById('setting-time').value) || 60;
            config.mode = document.getElementById('setting-mode').value;
            config.difficulty = document.getElementById('setting-difficulty').value;
            config.autoRead = document.getElementById('setting-autoread').checked;
            config.targetColor = document.getElementById('setting-color').value;
            startGame(config.mode);
        }

        function startGame(modeParam = 'standard') {
            config.mode = modeParam;
            if(config.mode === 'speed') config.questionTimeLimit = 5;
            else config.questionTimeLimit = 20;

            setupGameEnviroment();
        }

        function startActualGame() {
            showScreen('game-container');
            state = 'PLAYING';
            score = 0;
            timeLeft = config.totalTime;
            correctTouches = 0;
            totalAttempts = 0;
            lastBonusTime = timeLeft;
            isBonusRound = false;
            isTransitioning = false;
            
            updateScoreUI();
            document.getElementById('timer-display').innerText = timeLeft;
            
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(gameTimerTick, 1000);
            
            nextQuestion();
            gameLoop();
        }

        function gameTimerTick() {
            timeLeft--;
            document.getElementById('timer-display').innerText = timeLeft;
            
            if (timeLeft > 0 && (lastBonusTime - timeLeft >= 30) && !isBonusRound && !isTransitioning) {
                triggerBonusRound();
            }

            if (timeLeft <= 0) {
                endGame();
            }
        }

        function nextQuestion() {
            if(state !== 'PLAYING') return;
            isBonusRound = false;

            let availableQuestions = allQuestions;
            if (config.difficulty !== 'all') {
                availableQuestions = allQuestions.filter(q => q.diff === config.difficulty);
                if (availableQuestions.length === 0) availableQuestions = allQuestions; 
            }

            if (availableQuestions.length > 1 && currentQuestion) {
                availableQuestions = availableQuestions.filter(q => q.q !== currentQuestion.q);
            }

            const qIndex = Math.floor(Math.random() * availableQuestions.length);
            currentQuestion = availableQuestions[qIndex];

            let displayText = currentQuestion.q;
            const textToSpeak = currentQuestion.q.replace("_____", "blank");

            if(config.mode === 'listening') {
                displayText = "🎧 Listen and select the correct word!";
                speak(textToSpeak);
            } else {
                if(config.autoRead) {
                    speak(textToSpeak);
                }
            }
            
            const questionTextEl = document.getElementById('question-text');
            questionTextEl.innerText = displayText;

            // แก้ไขเรื่องขนาดของตัวอักษรคำถามให้เหมาะสมแบบ Responsive ยิ่งขึ้น
            questionTextEl.className = "font-black text-white drop-shadow-md leading-tight break-words";
            if (displayText.length > 40) {
                // ประโยคยาวมาก
                questionTextEl.classList.add("text-2xl", "md:text-3xl", "lg:text-4xl");
            } else if (displayText.length > 25) {
                // ประโยคยาวปานกลาง
                questionTextEl.classList.add("text-3xl", "md:text-4xl", "lg:text-5xl");
            } else {
                // ประโยคสั้น
                questionTextEl.classList.add("text-4xl", "md:text-5xl", "lg:text-6xl");
            }

            activeChoices = [];
            const w = canvas.width;
            const h = canvas.height;
            const yPos = h * 0.75; // ขยับวงกลมลงมานิดนึงเพื่อไม่ให้บังประโยคคำถามยาวๆ
            
            const positions = [
                {x: w * 0.2, y: yPos},
                {x: w * 0.5, y: yPos},
                {x: w * 0.8, y: yPos}
            ];

            const shuffledIndices = [0, 1, 2].sort(() => Math.random() - 0.5);

            for(let i = 0; i < 3; i++) {
                const choiceText = currentQuestion.choices[i];
                const pos = positions[shuffledIndices[i]];
                activeChoices.push({
                    text: choiceText,
                    x: pos.x,
                    y: pos.y,
                    radius: Math.min(w * 0.13, 110), // เพิ่มขนาดขอบเขตสูงสุดนิดนึง
                    isCorrect: (i === currentQuestion.a),
                    hoverProgress: 0,
                    color: config.targetColor
                });
            }
        }

        function triggerBonusRound() {
            isBonusRound = true;
            lastBonusTime = timeLeft;
            playSound('bonus');
            
            const questionTextEl = document.getElementById('question-text');
            questionTextEl.innerText = "⭐ BONUS ROUND! ⭐\nTouch 'START'";
            questionTextEl.className = "text-4xl md:text-5xl lg:text-6xl font-black text-yellow-300 drop-shadow-md leading-tight";
            
            activeChoices = [{
                text: "START",
                x: canvas.width / 2,
                y: canvas.height * 0.6,
                radius: 120,
                isCorrect: true,
                hoverProgress: 0,
                color: '#ff00ff'
            }];
        }

        async function gameLoop() {
            if(state !== 'PLAYING') return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            let poses = [];
            try {
                poses = await detector.estimatePoses(video);
            } catch(e) {}

            drawChoices();

            if (poses.length > 0) {
                const keypoints = poses[0].keypoints;
                const leftWrist = keypoints[9];
                const rightWrist = keypoints[10];

                const pointsToTrack = [];
                if(leftWrist.score > 0.3) pointsToTrack.push(mapVideoToCanvas(leftWrist.x, leftWrist.y));
                if(rightWrist.score > 0.3) pointsToTrack.push(mapVideoToCanvas(rightWrist.x, rightWrist.y));

                drawHands(pointsToTrack);
                checkIntersections(pointsToTrack);
            } else {
                activeChoices.forEach(c => c.hoverProgress = Math.max(0, c.hoverProgress - 5));
            }

            drawParticles();
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        function mapVideoToCanvas(vidX, vidY) {
            const videoRatio = video.videoWidth / video.videoHeight;
            const windowRatio = canvas.width / canvas.height;
            
            let drawWidth = canvas.width;
            let drawHeight = canvas.height;
            let offsetX = 0;
            let offsetY = 0;

            if (windowRatio < videoRatio) {
                drawWidth = canvas.height * videoRatio;
                offsetX = (canvas.width - drawWidth) / 2;
            } else {
                drawHeight = canvas.width / videoRatio;
                offsetY = (canvas.height - drawHeight) / 2;
            }

            let finalX = offsetX + (vidX * (drawWidth / video.videoWidth));
            let finalY = offsetY + (vidY * (drawHeight / video.videoHeight));

            return { x: finalX, y: finalY };
        }

        function drawHands(points) {
            ctx.fillStyle = 'rgba(0, 255, 255, 0.6)';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 4;
            points.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 30, 0, 2 * Math.PI);
                ctx.fill();
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 10, 0, 2 * Math.PI);
                ctx.fillStyle = 'white';
                ctx.fill();
            });
        }

        function drawChoices() {
            activeChoices.forEach(choice => {
                // วาดวงกลมพื้นฐาน
                ctx.beginPath();
                ctx.arc(choice.x, choice.y, choice.radius, 0, 2 * Math.PI);
                ctx.fillStyle = choice.color;
                ctx.fill();
                ctx.lineWidth = 6;
                ctx.strokeStyle = 'white';
                ctx.stroke();

                // วงแหวนสถานะการเลือก (Loading)
                if (choice.hoverProgress > 0) {
                    ctx.beginPath();
                    ctx.arc(choice.x, choice.y, choice.radius + 15, -0.5 * Math.PI, (-0.5 * Math.PI) + (2 * Math.PI * (choice.hoverProgress / 100)));
                    ctx.lineWidth = 10;
                    ctx.strokeStyle = '#4ade80'; 
                    ctx.stroke();
                }

                ctx.save();
                ctx.translate(choice.x, choice.y);
                ctx.scale(-1, 1); // พลิกตัวอักษรกลับมาให้ปกติ (แก้การพลิกของกล้อง)
                ctx.fillStyle = '#1a202c';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // คำนวณและปรับขนาดตัวอักษรให้พอดีกับกรอบวงกลม พร้อมระบบตัดบรรทัด
                let fontSize = choice.radius * 0.45; 
                const maxWidth = choice.radius * 1.7; // ความกว้างที่ยอมรับได้
                
                const words = choice.text.split(' ');
                
                if (words.length > 1) {
                    // หากมีหลายคำ แบ่งเป็น 2 บรรทัด
                    let midIndex = Math.ceil(words.length / 2);
                    let line1 = words.slice(0, midIndex).join(' ');
                    let line2 = words.slice(midIndex).join(' ');
                    
                    ctx.font = `bold ${fontSize * 0.8}px 'Nunito'`; // เล็กลงนิดนึงสำหรับ 2 บรรทัด
                    let w1 = ctx.measureText(line1).width;
                    let w2 = ctx.measureText(line2).width;
                    let maxW = Math.max(w1, w2);
                    
                    if (maxW > maxWidth) {
                        // ถ้ายาวเกินกรอบ ก็ทำการย่อสัดส่วนอีก
                        let scale = maxWidth / maxW;
                        ctx.font = `bold ${fontSize * 0.8 * scale}px 'Nunito'`;
                    }
                    
                    // วาดข้อความ 2 บรรทัด
                    ctx.fillText(line1, 0, -fontSize * 0.4);
                    ctx.fillText(line2, 0, fontSize * 0.4);
                } else {
                    // หากมีคำเดียว
                    ctx.font = `bold ${fontSize}px 'Nunito'`;
                    let textWidth = ctx.measureText(choice.text).width;
                    
                    if (textWidth > maxWidth) {
                        // ถ้ายาวเกิน ก็ย่อลงตามสัดส่วน
                        let scale = maxWidth / textWidth;
                        ctx.font = `bold ${fontSize * scale}px 'Nunito'`;
                    }
                    
                    ctx.fillText(choice.text, 0, 0);
                }
                
                ctx.restore();
            });
        }

        function checkIntersections(handPoints) {
            let hoveringAny = false;

            activeChoices.forEach(choice => {
                let isHovered = false;
                handPoints.forEach(hp => {
                    const dist = Math.hypot(hp.x - choice.x, hp.y - choice.y);
                    if (dist < choice.radius + 30) {
                        isHovered = true;
                    }
                });

                if (isHovered) {
                    choice.hoverProgress += 4; 
                    if (choice.hoverProgress >= 100) {
                        handleSelection(choice);
                        choice.hoverProgress = 0;
                    }
                } else {
                    choice.hoverProgress = Math.max(0, choice.hoverProgress - 5);
                }
            });
        }

        function handleSelection(choice) {
            if (isTransitioning) return; 
            isTransitioning = true;

            totalAttempts++;
            if (choice.isCorrect) {
                correctTouches++;
                let points = isBonusRound ? 50 : 10; 
                if(config.mode === 'speed') points *= 2;
                
                score += points;
                playSound('correct');
                showFeedback(`CORRECT! +${points}`, '#4ade80');
                createExplosion(choice.x, choice.y, '#4ade80');
                
                if(isBonusRound) {
                    isBonusRound = false;
                }
            } else {
                score -= 5;
                playSound('wrong');
                showFeedback("OOPS! -5", '#f87171');
                createExplosion(choice.x, choice.y, '#f87171');
            }
            
            updateScoreUI();
            
            activeChoices = [];
            setTimeout(() => {
                isTransitioning = false;
                nextQuestion();
            }, 1000);
        }

        function showFeedback(text, color) {
            const fb = document.getElementById('feedback-text');
            fb.innerText = text;
            fb.style.color = color;
            fb.classList.remove('feedback-anim');
            void fb.offsetWidth; 
            fb.classList.add('feedback-anim');
        }

        function updateScoreUI() {
            document.getElementById('score-display').innerText = score;
        }

        function createExplosion(x, y, color) {
            for(let i=0; i<30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 0.5) * 20,
                    life: 1.0,
                    color: color
                });
            }
        }

        function drawParticles() {
            for(let i = particles.length -1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                
                if(p.life <= 0) {
                    particles.splice(i, 1);
                    continue;
                }
                
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.globalAlpha = 1.0;
        }

        function endGame() {
            state = 'GAMEOVER';
            clearInterval(timerInterval);
            cancelAnimationFrame(gameLoopId);
            
            const accuracy = totalAttempts === 0 ? 0 : Math.round((correctTouches / totalAttempts) * 100);
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-accuracy').innerText = accuracy + '%';
            
            showScreen('screen-gameover');
            
            if('speechSynthesis' in window) {
                speak(`Game over! Your score is ${score}`);
            }
        }

        function saveScoreAndRestart() {
            const nameInput = document.getElementById('player-name').value.trim() || 'Anonymous Runner';
            
            let lb = JSON.parse(localStorage.getItem('ps_runner_lb') || '[]');
            lb.push({
                name: nameInput,
                score: score,
                date: new Date().toLocaleDateString()
            });
            
            lb.sort((a, b) => b.score - a.score);
            lb = lb.slice(0, 10);
            localStorage.setItem('ps_runner_lb', JSON.stringify(lb));
            
            showScreen('screen-leaderboard');
        }

        function loadLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            list.innerHTML = '';
            
            const lb = JSON.parse(localStorage.getItem('ps_runner_lb') || '[]');
            
            if(lb.length === 0) {
                list.innerHTML = '<p class="text-center text-white/50">No scores yet. Be the first!</p>';
                return;
            }

            lb.forEach((entry, idx) => {
                const row = document.createElement('div');
                row.className = 'flex justify-between items-center bg-white/10 p-3 rounded-lg border border-white/20 text-white';
                
                let medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx+1}.`;
                
                row.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="text-2xl w-8 text-center">${medal}</span>
                        <span class="font-bold text-lg">${entry.name}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-2xl brand-font text-yellow-300">${entry.score}</div>
                        <div class="text-xs text-gray-300">${entry.date}</div>
                    </div>
                `;
                list.appendChild(row);
            });
        }

        document.addEventListener('visibilitychange', () => {
            // Placeholder for pause state on visibility change
        });
    </script>
</body>
